plugins {
    id 'com.android.application'
}

android {
    namespace 'com.vietlott.mega645'
    compileSdk 34

    defaultConfig {
        applicationId "com.vietlott.mega645"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug {
            minifyEnabled false
        }
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {}
